<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[JUDUL PRESENTASI] | Template Slide</title>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* =============================================
   RESET & BASE
   ============================================= */
[x-cloak] { display: none !important }
* { box-sizing: border-box }
body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    overflow: hidden;
    height: 100vh;
}

/* =============================================
   BACKGROUND EFFECTS
   ============================================= */
/* Grid pattern */
body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
        linear-gradient(rgba(34,211,238,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,211,238,.015) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
}
/* Ambient glow blobs */
.blob-1 {
    position: fixed; pointer-events: none; z-index: 0;
    top: -10%; right: -10%;
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(34,211,238,0.05) 0%, transparent 70%);
    border-radius: 50%;
}
.blob-2 {
    position: fixed; pointer-events: none; z-index: 0;
    bottom: -10%; left: -10%;
    width: 50vw; height: 50vw;
    background: radial-gradient(circle, rgba(16,185,129,0.04) 0%, transparent 70%);
    border-radius: 50%;
}

/* =============================================
   CARD / PANEL COMPONENT (.pc)
   Gunakan class ini untuk kotak/panel konten
   ============================================= */
.pc {
    background: rgba(15,23,42,0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all .3s ease;
    position: relative;
    z-index: 10;
}
.pc:hover {
    border-color: rgba(34,211,238,0.3);
    box-shadow: 0 0 25px rgba(34,211,238,0.05);
}

/* =============================================
   TAG / BADGE COMPONENT (.tag)
   Gunakan kombinasi: tag + salah satu warna
   .tg = hijau  | .tc = cyan  | .ta = amber
   .tr = merah  | .tp = ungu  | .tsl = abu-abu
   ============================================= */
.tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: inline-block;
}
.tg  { background: rgba(16,185,129,0.1);  color: #10b981; border: 1px solid rgba(16,185,129,0.2); }
.tc  { background: rgba(34,211,238,0.1);  color: #22d3ee; border: 1px solid rgba(34,211,238,0.2); }
.ta  { background: rgba(245,158,11,0.1);  color: #f59e0b; border: 1px solid rgba(245,158,11,0.2); }
.tr  { background: rgba(239,68,68,0.1);   color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
.tp  { background: rgba(168,85,247,0.1);  color: #a855f7; border: 1px solid rgba(168,85,247,0.2); }
.tsl { background: rgba(255,255,255,0.05);color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
.tf  { background: rgba(34,211,238,0.08);  color: #67e8f9; border: 1px solid rgba(34,211,238,0.25); }

/* =============================================
   CODE BLOCK / TERMINAL COMPONENT (.cb)
   Warna teks kode: .cg .cy .cc .cp .cw .cgy
   ============================================= */
.cb {
    font-family: 'JetBrains Mono', monospace;
    background: #020617;
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 14px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.6;
}
.cg  { color: #10b981 } /* hijau  */
.cy  { color: #f59e0b } /* amber  */
.cc  { color: #22d3ee } /* cyan   */
.cp  { color: #a855f7 } /* ungu   */
.cw  { color: #f8fafc } /* putih  */
.cgy { color: #64748b } /* abu    */

/* =============================================
   LAYOUT HELPER
   ============================================= */
.two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
}

/* =============================================
   SLIDE ANIMATION
   ============================================= */
.slide-fade {
    animation: sfIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes sfIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* =============================================
   NAVIGATION BUTTONS
   ============================================= */
.nbtn {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    color: #94a3b8;
    transition: all 0.2s ease;
}
.nbtn:hover:not(:disabled) {
    background: rgba(34,211,238,0.1);
    border-color: #22d3ee;
    color: #22d3ee;
}
.nbtn:disabled { opacity: 0.25; cursor: not-allowed; }
.nbtn-p {
    background: rgba(34,211,238,0.1);
    border: 1px solid rgba(34,211,238,0.3);
    color: #22d3ee;
}
.nbtn-p:hover:not(:disabled) {
    background: rgba(34,211,238,0.2);
    border-color: #22d3ee;
    box-shadow: 0 0 12px rgba(34,211,238,0.2);
}

/* =============================================
   DOT INDICATOR
   ============================================= */
.dot-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    transition: all 0.3s ease;
}

/* =============================================
   RESET BUTTON
   ============================================= */
.nbtn-reset {
    background: rgba(239,68,68,0.07);
    border: 1px solid rgba(239,68,68,0.2);
    color: #f87171;
    cursor: pointer;
}
.nbtn-reset:hover {
    background: rgba(239,68,68,0.15);
    border-color: #ef4444;
    color: #fca5a5;
    box-shadow: 0 0 10px rgba(239,68,68,0.15);
}

/* =============================================
   SCROLLBAR
   ============================================= */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(34,211,238,0.2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(34,211,238,0.4); }
</style>
</head>

<!--
    =============================================
    ALPINE.JS ROOT — x-data="app()"
    Navigasi keyboard: ← → Spasi
    =============================================
-->
<body x-data="app()"
      @keydown.right.window="next()"
      @keydown.left.window="prev()"
      @keydown.space.window.prevent="next()">

<!-- Background decorative elements -->
<div class="blob-1"></div>
<div class="blob-2"></div>

<!-- =============================================
     LAYOUT UTAMA (flex column, full viewport)
     ============================================= -->
<div class="relative w-full h-full flex flex-col justify-between p-6 z-10 select-none">

    <!-- ==========================================
         HEADER — nama modul & nomor slide
         ========================================== -->
    <div class="w-full flex justify-between items-center border-b border-white/5 pb-4">
        <div class="flex items-center gap-3">
            <!-- Ganti teks tag dan label sesuai topik -->
            <span class="tag tp">PELATIHAN KEAMANAN SIBER - JUNIOR PENETRATION TESTER</span>
            <span class="text-white/30 text-sm">|</span>
            <span class="text-slate-400 font-medium text-sm tracking-wide" x-text="sectionName()"></span>
        </div>
        <div class="text-xs font-mono text-slate-500 tracking-wider">
            SLIDE <span class="text-cyan-400 font-bold" x-text="current + 1"></span>
            / <span x-text="totalSlides"></span>
        </div>
    </div>

    <!-- ==========================================
         AREA KONTEN SLIDE
         Posisi: vertikal & horizontal center
         ========================================== -->
    <div class="flex-1 w-full max-w-6xl mx-auto flex flex-col items-center my-4 overflow-y-auto pr-1 min-h-0">
        

        <!-- ======================================
             SLIDE 0 — COVER / HALAMAN JUDUL
             Tipe: centered hero, teks besar
             ====================================== -->
        <template x-if="current === 0">
            <div class="slide-fade w-full py-4 text-center flex flex-col items-center justify-center min-h-full">

                <!-- Label kategori -->
                <div class="inline-block tag tc mb-6 px-4 py-1.5 text-xs tracking-widest">
                    PELATIHAN KEAMANAN SIBER — JUNIOR PENETRATION TESTER
                </div>

                <!-- Judul utama dengan gradient -->
                <h1 class="text-white font-extrabold tracking-tight leading-tight mb-6"
                    style="font-size: clamp(2rem, 3.8vw, 4.5rem);">
                    Menyusun Laporan Hasil Pengujian Keamanan Siber <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-teal-400 to-emerald-400">
                        (Reporting)
                    </span>
                </h1>

                <!-- Deskripsi singkat -->
                <p class="text-slate-400 text-lg max-w-2xl mx-auto font-light leading-relaxed mb-10">
                    Pelatihan ini membekali peserta dengan kemampuan menyusun laporan hasil pengujian keamanan siber secara profesional, terstruktur, dan berorientasi pada tindak lanjut perbaikan nyata di organisasi.
                </p>

                <!-- Meta info (modul, level, dsb.) -->
                <div class="flex justify-center items-center gap-6 text-sm font-mono text-slate-500">
                    <div class="flex items-center gap-2 bg-slate-900/50 px-4 py-2 rounded-full border border-white/5">
                        <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                        Modul 07 — Security Reporting
                    </div>
                    <div class="flex items-center gap-2 bg-slate-900/50 px-4 py-2 rounded-full border border-white/5">
                        Junior Penetration Tester
                    </div>
                </div>

            </div>
        </template>

        <template x-if="current===1">
            <div class="slide-fade w-full py-4">

                <div class="mb-5">
                    <span class="tag tc">Sesi 01 — Fundamental Security Reporting</span>
                    <h2 class="text-2xl font-bold text-white mt-2">
                        Menyusun Laporan Hasil Pengujian Keamanan Siber
                    </h2>
                    <p class="text-slate-300 text-sm mt-3 leading-relaxed max-w-5xl">
                        Pelatihan ini membekali peserta dengan kemampuan menyusun laporan hasil vulnerability assessment, penetration testing, maupun security assessment lainnya secara profesional, evidence-based, mudah dipahami, dan mampu mendukung pengambilan keputusan teknis maupun manajerial.
                    </p>
                </div>

                <div class="two-col items-stretch">

                    <!-- LEFT -->
                    <div class="space-y-4 flex flex-col">

                        <div class="pc p-5 rounded-xl">
                            <span class="text-cyan-400 font-bold text-base block mb-3">
                                🎯 Learning Objectives
                            </span>

                            <div class="grid grid-cols-2 gap-3 text-xs">

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Memahami tujuan laporan keamanan siber
                                </div>

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Menyesuaikan laporan untuk audience berbeda
                                </div>

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Menulis findings yang profesional
                                </div>

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Menyusun executive summary
                                </div>

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Mendokumentasikan evidence
                                </div>

                                <div class="p-3 rounded-lg bg-slate-900/70 border border-white/5 text-slate-300">
                                    Membuat remediation recommendation
                                </div>

                            </div>
                        </div>

                        <div class="pc p-5 rounded-xl">
                            <span class="text-emerald-400 font-bold text-base block mb-3">
                                📦 Output Pelatihan
                            </span>

                            <ul class="text-slate-300 text-xs space-y-2 list-disc list-inside">
                                <li>Template laporan keamanan siber</li>
                                <li>Contoh dokumentasi findings</li>
                                <li>Draft executive summary</li>
                                <li>Mini assessment report siap review</li>
                            </ul>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="pc p-5 rounded-xl flex flex-col justify-between">

                        <div>
                            <span class="text-purple-400 font-bold text-base block mb-3">
                                🛡️ Mengapa Reporting Sangat Penting?
                            </span>

                            <p class="text-slate-300 text-xs leading-relaxed mb-4">
                                Dalam pengujian keamanan siber, deliverable paling bernilai bukan hanya proses testing, tetapi hasil laporan yang dapat dipahami dan ditindaklanjuti. Temuan yang tidak terdokumentasi dengan baik hampir tidak memiliki nilai operasional.
                            </p>

                            <div class="grid grid-cols-3 gap-3 text-center text-[11px]">

                                <div class="p-3 rounded-xl bg-red-950/30 border border-red-900/30">
                                    <div class="text-red-400 text-lg mb-1">⚠️</div>
                                    <div class="text-slate-300">
                                        Finding tanpa konteks
                                    </div>
                                </div>

                                <div class="p-3 rounded-xl bg-amber-950/30 border border-amber-900/30">
                                    <div class="text-amber-400 text-lg mb-1">📄</div>
                                    <div class="text-slate-300">
                                        Laporan ambigu
                                    </div>
                                </div>

                                <div class="p-3 rounded-xl bg-emerald-950/30 border border-emerald-900/30">
                                    <div class="text-emerald-400 text-lg mb-1">✅</div>
                                    <div class="text-slate-300">
                                        Perbaikan nyata
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-t border-white/5">
                            <span class="text-cyan-400 font-bold text-sm block mb-3">
                                Reporting Value Chain
                            </span>

                            <div class="grid grid-cols-5 gap-2 text-center text-[10px] font-mono">
                                <div class="p-2 rounded bg-slate-900 border border-white/5 text-slate-300">
                                    Assessment
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-cyan-900/30 text-cyan-400">
                                    Evidence
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-purple-900/30 text-purple-400">
                                    Analysis
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-amber-900/30 text-amber-400">
                                    Report
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-emerald-900/30 text-emerald-400">
                                    Decision
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </template>

        <template x-if="current===2">
            <div class="slide-fade w-full py-4">

                <div class="mb-5">
                    <span class="tag tp">Sesi 01 — Fundamental Security Reporting</span>
                    <h2 class="text-2xl font-bold text-white mt-2">
                        Mengapa Reporting Menjadi Deliverable Utama?
                    </h2>
                    <p class="text-slate-300 text-sm mt-3 leading-relaxed max-w-5xl">
                        Pengujian keamanan tanpa laporan yang baik sering gagal menghasilkan perubahan nyata. Reporting adalah mekanisme formal untuk menerjemahkan hasil teknis menjadi keputusan perbaikan, prioritas mitigasi, dan dokumentasi risiko organisasi.
                    </p>
                </div>

                <div class="two-col items-stretch">

                    <!-- LEFT -->
                    <div class="space-y-4 flex flex-col">

                        <div class="pc p-5 rounded-xl">
                            <span class="text-cyan-400 font-bold text-base block mb-3">
                                📌 Fungsi Utama Security Reporting
                            </span>

                            <div class="space-y-3 text-xs">

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-cyan-400 text-lg">🧾</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Dokumentasi Formal</strong><br>
                                        Menjadi catatan resmi hasil assessment untuk referensi internal maupun audit.
                                    </div>
                                </div>

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-emerald-400 text-lg">⚠️</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Komunikasi Risiko</strong><br>
                                        Menjelaskan dampak keamanan dalam bahasa yang dapat dipahami stakeholder.
                                    </div>
                                </div>

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-purple-400 text-lg">🛠️</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Panduan Remediasi</strong><br>
                                        Menyediakan tindakan korektif yang jelas dan actionable.
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="pc p-4 rounded-xl">
                            <span class="text-amber-400 font-bold text-sm block mb-2">
                                Realita Lapangan
                            </span>
                            <p class="text-slate-300 text-xs leading-relaxed">
                                Banyak organisasi melakukan assessment berkala, namun findings tidak pernah diperbaiki karena laporan terlalu teknis, ambigu, tidak memiliki prioritas, atau tidak menjelaskan business impact.
                            </p>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="pc p-5 rounded-xl flex flex-col justify-between">

                        <div>
                            <span class="text-red-400 font-bold text-base block mb-3">
                                🚨 Jika Reporting Buruk...
                            </span>

                            <div class="space-y-3 text-xs">

                                <div class="p-3 rounded-lg bg-red-950/20 border border-red-900/30">
                                    <div class="text-red-400 font-semibold mb-1">
                                        Temuan Tidak Ditindaklanjuti
                                    </div>
                                    <div class="text-slate-300">
                                        Tim teknis tidak tahu langkah perbaikan yang tepat.
                                    </div>
                                </div>

                                <div class="p-3 rounded-lg bg-amber-950/20 border border-amber-900/30">
                                    <div class="text-amber-400 font-semibold mb-1">
                                        Prioritas Salah
                                    </div>
                                    <div class="text-slate-300">
                                        Kerentanan minor diperbaiki lebih dulu, risiko kritikal terabaikan.
                                    </div>
                                </div>

                                <div class="p-3 rounded-lg bg-purple-950/20 border border-purple-900/30">
                                    <div class="text-purple-400 font-semibold mb-1">
                                        Manajemen Tidak Memahami Risiko
                                    </div>
                                    <div class="text-slate-300">
                                        Decision maker menerima jargon teknis tanpa konteks bisnis.
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="mt-5 pt-4 border-t border-white/5">
                            <span class="text-cyan-400 font-bold text-sm block mb-3">
                                Reporting Maturity Path
                            </span>

                            <div class="grid grid-cols-4 gap-2 text-center text-[10px] font-mono">

                                <div class="p-2 rounded bg-slate-900 border border-white/5 text-slate-300">
                                    Findings
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-cyan-900/30 text-cyan-400">
                                    Context
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-amber-900/30 text-amber-400">
                                    Action
                                </div>

                                <div class="p-2 rounded bg-slate-900 border border-emerald-900/30 text-emerald-400">
                                    Improvement
                                </div>

                            </div>
                        </div>

                    </div>

                </div>

            </div>
        </template>

        <template x-if="current===3">
            <div class="slide-fade w-full py-4">

                <div class="mb-5">
                    <span class="tag tg">Sesi 01 — Fundamental Security Reporting</span>
                    <h2 class="text-2xl font-bold text-white mt-2">
                        Tujuan Laporan Hasil Pengujian Keamanan Siber
                    </h2>
                    <p class="text-slate-300 text-sm mt-3 leading-relaxed max-w-5xl">
                        Laporan hasil pengujian keamanan bukan sekadar dokumen formal penutup engagement. Ia berfungsi sebagai media komunikasi risiko, dasar prioritas mitigasi, bukti assessment, dan referensi peningkatan posture keamanan organisasi.
                    </p>
                </div>

                <div class="two-col items-stretch">

                    <!-- LEFT -->
                    <div class="pc p-5 rounded-xl flex flex-col justify-between">

                        <div>
                            <span class="text-emerald-400 font-bold text-base block mb-3">
                                🎯 Tujuan Utama Reporting
                            </span>

                            <div class="space-y-3 text-xs">

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-cyan-400 text-lg">📋</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Dokumentasi Resmi</strong><br>
                                        Menjadi catatan formal seluruh aktivitas assessment, scope, metodologi, temuan, dan hasil validasi.
                                    </div>
                                </div>

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-purple-400 text-lg">⚠️</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Komunikasi Risiko</strong><br>
                                        Menjelaskan ancaman teknis dalam bahasa yang bisa dipahami stakeholder non-teknis.
                                    </div>
                                </div>

                                <div class="flex gap-3 p-3 rounded-lg bg-slate-900/70 border border-white/5">
                                    <div class="text-amber-400 text-lg">🛠️</div>
                                    <div class="text-slate-300 leading-relaxed">
                                        <strong class="text-white">Panduan Perbaikan</strong><br>
                                        Memberikan rekomendasi mitigasi yang realistis, jelas, dan dapat dieksekusi.
                                    </div>
                                </div>

                            </div>
                        </div>

                        <div class="mt-4 pt-4 border-t border-white/5">
                            <div class="text-cyan-400 text-xs font-semibold uppercase tracking-wider mb-2">
                                Practical Insight
                            </div>
                            <p class="text-slate-300 text-xs leading-relaxed">
                                Banyak assessment technically berhasil, tetapi secara organisasi gagal karena hasilnya tidak pernah diterjemahkan menjadi action plan.
                            </p>
                        </div>

                    </div>

                    <!-- RIGHT -->
                    <div class="space-y-4 flex flex-col">

                        <div class="pc p-5 rounded-xl">
                            <span class="text-cyan-400 font-bold text-base block mb-3">
                                🏢 Perspektif Organisasi
                            </span>

<!-- =============================================
     ALPINE.JS LOGIC
     =============================================
     CARA KUSTOMISASI:
     1. Ubah totalSlides → sesuaikan dengan jumlah slide Anda
     2. Tambahkan nama sesi di array sections[]
     3. Atur warna dot per slide di colorMapping[]
        Warna tersedia: #22d3ee (cyan), #10b981 (hijau),
        #a855f7 (ungu), #f59e0b (amber), #ef4444 (merah), #94a3b8 (abu)
     ============================================= -->
<script>
function app() {
    return {
        current: 0,
        totalSlides: 57, /* ← UBAH SESUAI JUMLAH SLIDE ANDA */

        next() {
            if (this.current < this.totalSlides - 1) this.current++;
        },
        prev() {
            if (this.current > 0) this.current--;
        },
        reset() {
            this.current = 0;
        },

        /*
         * sectionName() — nama yang tampil di header
         * Tambahkan satu string per slide
         */
        sectionName() {
            const sections = [
                'Laporan',   /* slide 0 */
                'Tujuan Pembelajaran',          /* slide 1 */
                'Fungsi Utama',  /* slide 2 */
                'Tujuan Laporan',   /* slide 3 */
                'Audiens',
                'Struktur Standar',
                'Halaman Sampul',
                'Ringkasan Eksekutif',
                'Ruang Lingkup dan Metodologi',
                'Temuan Kerentanan',
                'Judul Temuan',
                'Tingkat Risiko',
                'CVSS',
                'Deskripsi Temuan',
                'Dampak Potensial',
                'Evidence',
                'Proof of Concept',
                'Rekomendasi Perbaikan',
                'Root Cause Analysis',
                'Temuan Lengkap',
                'Kualitas Dokumentasi',
                'Dokumentasi Evidence',
                'Bukti Berbasis Output',
                'Kesalahan Umum',
                'Dokumen Evidence untuk Audiens',
                'Penyusunan Lampiran',
                'Matriks Risiko',
                'Timeline Perbaikan',
                'Validasi Perbaikan',
                'Risk Aceptance',
                'Ringkasan Temuan untuk Manajemen',
                'Executive Summary',
                'Kesimpulan & Penutup',     /* slide 4 */
                /* tambahkan lebih banyak di sini */
            ];
            return sections[this.current] || '';
        },

        /*
         * sectionDotsColor() — warna dot aktif sesuai sesi
         * Satu warna per slide, urutan sama dengan sections[]
         */
        sectionDotsColor() {
            const colorMapping = [
                '#22d3ee', /* slide 0 — cyan   */
                '#94a3b8', /* slide 1 — abu    */
                '#10b981', /* slide 2 — hijau  */
                '#22d3ee', /* slide 3 — cyan   */
                '#10b981', /* slide 4 — hijau  */
                /* tambahkan lebih banyak di sini */
            ];
            return colorMapping[this.current] || '#22d3ee';
        }
    }
}
</script>
